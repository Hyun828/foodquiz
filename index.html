<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>식품군 분류 퀴즈</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<style>
    * { 
        box-sizing: border-box; 
        -webkit-touch-callout: none !important; 
        -webkit-user-select: none !important; 
        user-select: none !important; 
    }
    body { font-family: sans-serif; text-align: center; margin: 10px; background-color: #f9f9f9; overscroll-behavior-y: contain; }
    h2 { margin-top: 10px; }
    
    #categories { 
        display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; 
    }
    
    .category-box { 
        width: 200px; min-width: 200px; min-height: 200px; border: 2px dashed #888; border-radius: 8px; 
        padding: 5px; background-color: #fff; 
        display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
    }
    .category-box h3 { 
        font-size: 14px; margin-top: 0; margin-bottom: 8px; width: 100%; 
        border-bottom: 1px solid #ccc; padding-bottom: 5px; pointer-events: none;
    }
    
    .drop-zone {
        width: 100%; flex-grow: 1; display: flex; align-content: flex-start; flex-wrap: wrap; gap: 4px; 
        justify-content: flex-start;
    }
    
    #food-container { 
        display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; 
        border: 2px solid #ddd; border-radius: 8px; padding: 12px; min-height: 150px; background-color: #fff; 
    }
    
    .food-item-wrapper {
        width: 60px; height: 60px; flex: 0 0 60px; position: relative; cursor: grab; overflow: visible;
    }
    .food-item-wrapper:active { cursor: grabbing; }
    
    .food-item { 
        width: 100%; height: 100%; object-fit: cover; 
        border: 1px solid #aaa; border-radius: 5px; background-color: #fff; pointer-events: none;
    }
    
    .food-name-label {
        position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: white; padding: 4px 8px; border-radius: 4px;
        font-size: 13px; white-space: nowrap; display: none; z-index: 9999; pointer-events: none;
    }
    
    .sortable-drag .food-name-label, 
    .sortable-fallback .food-name-label { display: block; }

    .sortable-ghost { opacity: 0.3; background-color: #e0e0e0; } 
    .sortable-drag, .sortable-fallback { opacity: 1 !important; transform: scale(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
</style>

    function updateCounts() {
        document.querySelectorAll('.category-box').forEach(box => {
            const count = box.querySelectorAll('.food-item-wrapper').length;
            box.querySelector('.count').innerText = count;
        });
    }

    window.onload = function() {
        const container = document.getElementById('food-container');
        
        foodData.forEach((item) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'food-item-wrapper';
            
            wrapper.oncontextmenu = function(e) { e.preventDefault(); return false; };
            
            const img = document.createElement('img');
            img.src = item.src;
            img.className = 'food-item';
            
            const label = document.createElement('div');
            label.className = 'food-name-label';
            label.innerText = item.name;

            wrapper.appendChild(img);
            wrapper.appendChild(label);
            container.appendChild(wrapper);
        });

        const lists = document.querySelectorAll('.sortable-list');
        lists.forEach(list => {
            new Sortable(list, {
                group: 'shared', 
                draggable: '.food-item-wrapper',
                animation: 150,
                delay: 150,
                delayOnTouchOnly: true,
                forceFallback: true,
                fallbackOnBody: true,
                fallbackTolerance: 5,
                onEnd: updateCounts
            });
        });
    };
</script>
